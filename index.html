<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Word Quest</title>
  <style>
    :root {
      --sky: #78d1e3;
      --teal: #007a99;
      --teal-dark: #00657c;
      --cream: #fff0c9;
      --paper: #fff8e9;
      --yellow: #fac83b;
      --brown: #6b351e;
      --green: #79b842;
      --ink: #18120f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--sky);
      color: var(--ink);
      font-family: "Arial Rounded MT Bold", "Nunito", "Trebuchet MS", Arial, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      min-width: 80px;
      min-height: 80px;
      border: 7px solid #fffbed;
      border-radius: 22px;
      background: var(--yellow);
      color: var(--brown);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(80, 48, 20, 0.2);
      transition: transform 110ms ease, filter 110ms ease;
    }

    button:active,
    button.press {
      transform: scale(0.9);
      filter: brightness(0.97);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
    }

    .screen {
      position: absolute;
      inset: 0;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: none;
    }

    .screen.active { display: grid; }

    .panel {
      width: min(1120px, 100%);
      height: min(720px, calc(100vh - 32px));
      margin: auto;
      border: 10px solid #fffbed;
      border-radius: 24px;
      background: var(--teal);
      box-shadow: 0 18px 0 rgba(0, 77, 96, 0.18);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 18px;
      background: #fffbed;
      border-radius: 999px;
      opacity: 0.95;
      z-index: 0;
    }

    .panel::before { top: -8px; transform: rotate(-1deg); }
    .panel::after { bottom: -8px; transform: rotate(1deg); }

    .menu-panel {
      background: var(--cream);
      padding: clamp(16px, 2.4vw, 28px);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: clamp(8px, 1.4vw, 14px);
    }

    h1, h2, p { margin: 0; }

    .menu-title {
      color: #32692d;
      font-size: clamp(32px, 5.2vw, 58px);
      text-align: center;
      line-height: 1;
      text-shadow: 0 4px 0 rgba(255, 255, 255, 0.9);
    }

    .unlock-text {
      color: var(--brown);
      font-size: clamp(18px, 2.4vw, 26px);
      text-align: center;
      font-weight: 900;
      line-height: 1.1;
    }

    .level-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: clamp(8px, 1.4vw, 14px);
      align-content: start;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 2px 8px 12px;
      scrollbar-width: thin;
    }

    .level-button {
      background: var(--teal);
      color: #fffbed;
      border-color: #fffbed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: 78px;
      font-size: clamp(15px, 1.45vw, 20px);
      line-height: 1.05;
      padding: 8px;
      white-space: normal;
      text-align: center;
    }

    .level-number {
      display: block;
      font-size: 1.05em;
    }

    .level-name {
      display: block;
      overflow-wrap: anywhere;
    }

    .level-button.locked {
      background: #91b6ba;
      color: rgba(255, 251, 237, 0.72);
      cursor: default;
      filter: saturate(0.65);
    }

    .game-panel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: clamp(8px, 1.4vw, 12px);
      padding: clamp(16px, 2.2vw, 24px) clamp(16px, 2.4vw, 26px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: #fffbed;
      font-weight: 900;
      font-size: clamp(22px, 3.5vw, 38px);
      position: relative;
      z-index: 1;
    }

    .topbar h2 {
      min-width: 0;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .progress {
      flex: 0 0 auto;
      font-size: clamp(18px, 2.3vw, 28px);
      white-space: nowrap;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      color: #fffbed;
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 900;
      line-height: 1.08;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .sound-button {
      width: 80px;
      min-width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #79b842;
      color: #fffbed;
      font-size: 32px;
      line-height: 1;
    }

    .card-row {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(170px, 244px));
      justify-content: center;
      align-items: center;
      gap: clamp(14px, 3vw, 28px);
      position: relative;
      z-index: 1;
    }

    .animal-card {
      min-width: 0;
      min-height: 0;
      width: min(21vw, 220px);
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      position: relative;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 8px;
      justify-items: center;
    }

    .card-image-frame {
      width: 100%;
      aspect-ratio: 720 / 980;
      display: grid;
      place-items: center;
    }

    .animal-card[data-key^="vocabulary/"] .card-image-frame {
      aspect-ratio: 1;
    }

    .animal-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 10px 0 rgba(0, 63, 81, 0.18));
      pointer-events: none;
    }

    .option-word {
      width: 100%;
      min-height: 38px;
      padding: 4px 6px;
      border-radius: 14px;
      background: rgba(255, 251, 237, 0.92);
      color: var(--brown);
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      overflow-wrap: anywhere;
      box-shadow: 0 5px 0 rgba(0, 63, 81, 0.12);
      pointer-events: none;
    }

    .animal-card.correct .card-image-frame img {
      animation: flash 0.16s ease-in-out 6;
    }

    .animal-card.wrong .card-image-frame img {
      animation: shake 0.34s ease-in-out;
    }

    .bottom-bar {
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .back-button,
    .next-button {
      padding: 0 28px;
      font-size: clamp(22px, 3vw, 34px);
    }

    .victory-panel {
      display: grid;
      place-items: center;
      background: var(--teal);
    }

    .victory-box {
      display: grid;
      justify-items: center;
      gap: 24px;
      color: #fffbed;
      font-weight: 900;
      text-align: center;
      z-index: 2;
    }

    .victory-title {
      visibility: hidden;
      font-size: clamp(54px, 9vw, 94px);
      line-height: 1;
      text-shadow: 0 7px 0 rgba(0, 55, 66, 0.22);
    }

    .next-button {
      visibility: hidden;
      padding-inline: 36px;
      background: #79b842;
      color: #fffbed;
      transform: scale(0.75);
    }

    .victory-ready .victory-title,
    .victory-ready .next-button {
      visibility: visible;
    }

    .victory-ready .next-button {
      animation: pop 0.28s cubic-bezier(.2, 1.4, .4, 1) forwards;
    }

    .star {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      background: #facc15;
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      animation: burst 650ms ease-out forwards;
      z-index: 10;
    }

    .confetti {
      position: absolute;
      width: 16px;
      height: 26px;
      border-radius: 5px;
      pointer-events: none;
      animation: confetti 1900ms ease-out forwards;
      z-index: 4;
    }

    .grass {
      position: absolute;
      inset-inline: 0;
      bottom: 0;
      height: 56px;
      background:
        radial-gradient(ellipse at 12% 72%, #2d7f35 0 18px, transparent 19px),
        radial-gradient(ellipse at 84% 85%, #4f9f3c 0 45px, transparent 46px),
        linear-gradient(#7fbd3e, #6aab31);
      z-index: 0;
    }

    .cloud {
      position: absolute;
      width: 220px;
      height: 34px;
      border-radius: 999px;
      background: #fffbed;
      opacity: 0.96;
      bottom: 86px;
      left: 8%;
      z-index: 0;
    }

    .cloud.second {
      width: 260px;
      left: auto;
      right: 8%;
      bottom: 70px;
    }

    @keyframes flash {
      50% { filter: drop-shadow(0 10px 0 rgba(0, 63, 81, 0.18)) brightness(1.35); }
    }

    @keyframes shake {
      20% { transform: translateX(-10px) rotate(-4deg); }
      45% { transform: translateX(10px) rotate(4deg); }
      70% { transform: translateX(-6px) rotate(-2deg); }
      100% { transform: translateX(0) rotate(0); }
    }

    @keyframes burst {
      from { opacity: 1; transform: translate(0, 0) scale(0.7) rotate(0deg); }
      to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.4) rotate(180deg); }
    }

    @keyframes confetti {
      from { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      to { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(360deg); }
    }

    @keyframes pop {
      to { transform: scale(1); }
    }

    @media (max-width: 780px) {
      body { overflow: auto; }
      .app, .screen { min-height: 100vh; height: auto; }
      .panel { height: auto; min-height: calc(100vh - 32px); }
      .menu-panel { padding: 22px; }
      .level-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .game-panel { padding: 18px 16px; }
      .topbar { align-items: flex-start; }
      .card-row {
        grid-template-columns: repeat(3, minmax(92px, 1fr));
        gap: 8px;
      }
      .animal-card { width: 100%; }
      .option-word { min-height: 32px; font-size: 18px; }
      .sound-button { width: 72px; min-width: 72px; height: 72px; }
    }

    @media (max-width: 520px) {
      .card-row { grid-template-columns: minmax(180px, 72vw); }
      .animal-card { width: 72vw; }
      .topbar { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="menuScreen" class="screen active">
      <div class="panel menu-panel">
        <h1 class="menu-title">Word Quest</h1>
        <p id="unlockText" class="unlock-text">Choose any level</p>
        <div id="levelGrid" class="level-grid"></div>
      </div>
      <div class="grass"></div>
      <div class="cloud"></div>
      <div class="cloud second"></div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="panel game-panel">
        <div class="topbar">
          <h2 id="themeTitle">Farm Animals</h2>
          <span id="questionProgress" class="progress">1 / 3</span>
        </div>
        <div class="prompt-row">
          <span id="promptText">Where is the Dog?</span>
          <button id="soundButton" class="sound-button" aria-label="Listen again">♪</button>
        </div>
        <div id="cardRow" class="card-row"></div>
        <div class="bottom-bar">
          <button id="backButton" class="back-button">Back</button>
        </div>
      </div>
    </section>

    <section id="victoryScreen" class="screen">
      <div id="victoryPanel" class="panel victory-panel">
        <div class="victory-box">
          <h2 class="victory-title">Great Job!</h2>
          <button id="nextButton" class="next-button">Next</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const levels = [
      ["Farm Animals", [["Dog","dog",["Cow","cow"],["Pig","pig"]],["Cow","cow",["Dog","dog"],["Pig","pig"]],["Pig","pig",["Dog","dog"],["Cow","cow"]]]],
      ["Pet Friends", [["Cat","cat",["Rabbit","rabbit"],["Hamster","hamster"]],["Rabbit","rabbit",["Cat","cat"],["Hamster","hamster"]],["Hamster","hamster",["Cat","cat"],["Rabbit","rabbit"]]]],
      ["Jungle Animals", [["Lion","lion",["Tiger","tiger"],["Monkey","monkey"]],["Tiger","tiger",["Lion","lion"],["Monkey","monkey"]],["Monkey","monkey",["Lion","lion"],["Tiger","tiger"]]]],
      ["Savanna Animals", [["Elephant","elephant",["Giraffe","giraffe"],["Zebra","zebra"]],["Giraffe","giraffe",["Elephant","elephant"],["Zebra","zebra"]],["Zebra","zebra",["Elephant","elephant"],["Giraffe","giraffe"]]]],
      ["Forest Animals", [["Bear","bear",["Deer","deer"],["Fox","fox"]],["Deer","deer",["Bear","bear"],["Fox","fox"]],["Fox","fox",["Bear","bear"],["Deer","deer"]]]],
      ["Water Animals", [["Fish","fish",["Dolphin","dolphin"],["Crab","crab"]],["Dolphin","dolphin",["Fish","fish"],["Crab","crab"]],["Crab","crab",["Fish","fish"],["Dolphin","dolphin"]]]],
      ["Bird Friends", [["Duck","duck",["Goose","goose"],["Chicken","chicken"]],["Goose","goose",["Duck","duck"],["Chicken","chicken"]],["Chicken","chicken",["Duck","duck"],["Goose","goose"]]]],
      ["Polar Animals", [["Penguin","penguin",["Polar Bear","polar_bear"],["Seal","seal"]],["Polar Bear","polar_bear",["Penguin","penguin"],["Seal","seal"]],["Seal","seal",["Penguin","penguin"],["Polar Bear","polar_bear"]]]],
      ["Little Bugs", [["Butterfly","butterfly",["Bee","bee"],["Ladybug","ladybug"]],["Bee","bee",["Butterfly","butterfly"],["Ladybug","ladybug"]],["Ladybug","ladybug",["Butterfly","butterfly"],["Bee","bee"]]]],
      ["Amazing Animals", [["Panda","panda",["Kangaroo","kangaroo"],["Turtle","turtle"]],["Kangaroo","kangaroo",["Panda","panda"],["Turtle","turtle"]],["Turtle","turtle",["Panda","panda"],["Kangaroo","kangaroo"]]]],
      ["Vehicles 1", [["Car","vocabulary/car",["Bus","vocabulary/bus"],["Truck","vocabulary/truck"]],["Bus","vocabulary/bus",["Car","vocabulary/car"],["Truck","vocabulary/truck"]],["Truck","vocabulary/truck",["Car","vocabulary/car"],["Bus","vocabulary/bus"]]]],
      ["Vehicles 2", [["Train","vocabulary/train",["Airplane","vocabulary/airplane"],["Helicopter","vocabulary/helicopter"]],["Airplane","vocabulary/airplane",["Train","vocabulary/train"],["Helicopter","vocabulary/helicopter"]],["Helicopter","vocabulary/helicopter",["Train","vocabulary/train"],["Airplane","vocabulary/airplane"]]]],
      ["Vehicles 3", [["Boat","vocabulary/boat",["Ship","vocabulary/ship"],["Bicycle","vocabulary/bicycle"]],["Ship","vocabulary/ship",["Boat","vocabulary/boat"],["Bicycle","vocabulary/bicycle"]],["Bicycle","vocabulary/bicycle",["Boat","vocabulary/boat"],["Ship","vocabulary/ship"]]]],
      ["Vehicles 4", [["Scooter","vocabulary/scooter",["Car","vocabulary/car"],["Bus","vocabulary/bus"]],["Car","vocabulary/car",["Scooter","vocabulary/scooter"],["Bus","vocabulary/bus"]],["Bus","vocabulary/bus",["Scooter","vocabulary/scooter"],["Car","vocabulary/car"]]]],
      ["Fruits 1", [["Apple","vocabulary/apple",["Banana","vocabulary/banana"],["Orange","vocabulary/orange"]],["Banana","vocabulary/banana",["Apple","vocabulary/apple"],["Orange","vocabulary/orange"]],["Orange","vocabulary/orange",["Apple","vocabulary/apple"],["Banana","vocabulary/banana"]]]],
      ["Fruits 2", [["Strawberry","vocabulary/strawberry",["Watermelon","vocabulary/watermelon"],["Grapes","vocabulary/grapes"]],["Watermelon","vocabulary/watermelon",["Strawberry","vocabulary/strawberry"],["Grapes","vocabulary/grapes"]],["Grapes","vocabulary/grapes",["Strawberry","vocabulary/strawberry"],["Watermelon","vocabulary/watermelon"]]]],
      ["Fruits 3", [["Pear","vocabulary/pear",["Peach","vocabulary/peach"],["Plum","vocabulary/plum"]],["Peach","vocabulary/peach",["Pear","vocabulary/pear"],["Plum","vocabulary/plum"]],["Plum","vocabulary/plum",["Pear","vocabulary/pear"],["Peach","vocabulary/peach"]]]],
      ["Fruits 4", [["Cherry","vocabulary/cherry",["Apple","vocabulary/apple"],["Pear","vocabulary/pear"]],["Apple","vocabulary/apple",["Cherry","vocabulary/cherry"],["Pear","vocabulary/pear"]],["Pear","vocabulary/pear",["Cherry","vocabulary/cherry"],["Apple","vocabulary/apple"]]]],
      ["Colors 1", [["Red","vocabulary/red",["Blue","vocabulary/blue"],["Yellow","vocabulary/yellow"]],["Blue","vocabulary/blue",["Red","vocabulary/red"],["Yellow","vocabulary/yellow"]],["Yellow","vocabulary/yellow",["Red","vocabulary/red"],["Blue","vocabulary/blue"]]]],
      ["Colors 2", [["Green","vocabulary/green",["Orange","vocabulary/orange_star"],["Purple","vocabulary/purple_star"]],["Orange","vocabulary/orange_star",["Green","vocabulary/green"],["Purple","vocabulary/purple_star"]],["Purple","vocabulary/purple_star",["Green","vocabulary/green"],["Orange","vocabulary/orange_star"]]]],
      ["Colors 3", [["Pink","vocabulary/pink",["Brown","vocabulary/brown"],["Black","vocabulary/black"]],["Brown","vocabulary/brown",["Pink","vocabulary/pink"],["Black","vocabulary/black"]],["Black","vocabulary/black",["Pink","vocabulary/pink"],["Brown","vocabulary/brown"]]]],
      ["Colors 4", [["White","vocabulary/white",["Rainbow","vocabulary/rainbow_circle"],["Gradient","vocabulary/gradient_square"]],["Rainbow","vocabulary/rainbow_circle",["White","vocabulary/white"],["Gradient","vocabulary/gradient_square"]],["Gradient","vocabulary/gradient_square",["White","vocabulary/white"],["Rainbow","vocabulary/rainbow_circle"]]]],
      ["Shapes 1", [["Triangle","vocabulary/triangle",["Rectangle","vocabulary/rectangle"],["Oval","vocabulary/oval"]],["Rectangle","vocabulary/rectangle",["Triangle","vocabulary/triangle"],["Oval","vocabulary/oval"]],["Oval","vocabulary/oval",["Triangle","vocabulary/triangle"],["Rectangle","vocabulary/rectangle"]]]],
      ["Shapes 2", [["Diamond","vocabulary/diamond",["Star","vocabulary/star"],["Heart","vocabulary/heart"]],["Star","vocabulary/star",["Diamond","vocabulary/diamond"],["Heart","vocabulary/heart"]],["Heart","vocabulary/heart",["Diamond","vocabulary/diamond"],["Star","vocabulary/star"]]]],
      ["Shapes 3", [["Moon","vocabulary/moon",["Cube","vocabulary/cube"],["Pentagon","vocabulary/pink"]],["Cube","vocabulary/cube",["Moon","vocabulary/moon"],["Pentagon","vocabulary/pink"]],["Pentagon","vocabulary/pink",["Moon","vocabulary/moon"],["Cube","vocabulary/cube"]]]]
    ];

    const state = {
      levelIndex: 0,
      questionIndex: 0,
      accepting: true,
      highestUnlocked: levels.length
    };

    const menuScreen = document.getElementById("menuScreen");
    const gameScreen = document.getElementById("gameScreen");
    const victoryScreen = document.getElementById("victoryScreen");
    const levelGrid = document.getElementById("levelGrid");
    const unlockText = document.getElementById("unlockText");
    const themeTitle = document.getElementById("themeTitle");
    const questionProgress = document.getElementById("questionProgress");
    const promptText = document.getElementById("promptText");
    const cardRow = document.getElementById("cardRow");
    const soundButton = document.getElementById("soundButton");
    const backButton = document.getElementById("backButton");
    const nextButton = document.getElementById("nextButton");
    const victoryPanel = document.getElementById("victoryPanel");

    let voiceAudio = null;
    const dingAudio = new Audio("assets/sounds/ding.wav");

    function show(screen) {
      [menuScreen, gameScreen, victoryScreen].forEach(item => item.classList.remove("active"));
      screen.classList.add("active");
    }

    function asset(name, type) {
      if (type === "audio") {
        return name.includes("/") ? "" : `assets/sounds/${name}.wav?v=20260706-real-assets`;
      }
      return name.includes("/") ? `assets/${name}.png?v=20260706-real-assets` : `assets/animals/${name}.jpg?v=20260706-real-assets`;
    }

    function speakWord(word) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    function renderMenu() {
      state.highestUnlocked = levels.length;
      unlockText.textContent = `Choose any level (${levels.length})`;
      levelGrid.innerHTML = "";
      levels.forEach((level, index) => {
        const button = document.createElement("button");
        button.className = "level-button";
        button.innerHTML = `<span class="level-number">${index + 1}</span><span class="level-name">${level[0]}</span>`;
        button.addEventListener("click", () => startLevel(index));
        levelGrid.appendChild(button);
      });
      show(menuScreen);
    }

    function startLevel(index) {
      state.levelIndex = index;
      state.questionIndex = 0;
      loadQuestion();
      show(gameScreen);
      playVoice();
    }

    function currentQuestion() {
      return levels[state.levelIndex][1][state.questionIndex];
    }

    function loadQuestion() {
      state.accepting = true;
      const level = levels[state.levelIndex];
      const question = currentQuestion();
      const options = [
        { label: question[0], key: question[1], correct: true },
        { label: question[2][0], key: question[2][1], correct: false },
        { label: question[3][0], key: question[3][1], correct: false }
      ].sort(() => Math.random() - 0.5);

      themeTitle.textContent = level[0];
      questionProgress.textContent = `${state.questionIndex + 1} / ${level[1].length}`;
      promptText.textContent = `Where is the ${question[0]}?`;
      cardRow.innerHTML = "";

      options.forEach(option => {
        const button = document.createElement("button");
        button.className = "animal-card";
        button.dataset.key = option.key;
        button.dataset.correct = String(option.correct);
        button.setAttribute("aria-label", option.label);

        const imageFrame = document.createElement("span");
        imageFrame.className = "card-image-frame";

        const img = document.createElement("img");
        img.src = asset(option.key, "image");
        img.alt = option.label;
        imageFrame.appendChild(img);
        button.appendChild(imageFrame);

        const word = document.createElement("span");
        word.className = "option-word";
        word.textContent = option.label;
        button.appendChild(word);

        button.addEventListener("click", () => onAnimalClicked(button));
        cardRow.appendChild(button);
      });
    }

    function playVoice() {
      const question = currentQuestion();
      if (voiceAudio) {
        voiceAudio.pause();
      }
      const audioPath = asset(question[1], "audio");
      if (!audioPath) {
        speakWord(question[0]);
        return;
      }
      voiceAudio = new Audio(audioPath);
      voiceAudio.addEventListener("error", () => speakWord(question[0]), { once: true });
      voiceAudio.play().catch(() => speakWord(question[0]));
    }

    function onAnimalClicked(button) {
      if (!state.accepting) return;
      state.accepting = false;
      button.classList.add("press");
      setTimeout(() => button.classList.remove("press"), 140);

      if (button.dataset.correct === "true") {
        onCorrect(button);
      } else {
        onWrong(button);
      }
    }

    function onCorrect(button) {
      button.classList.add("correct");
      dingAudio.currentTime = 0;
      dingAudio.play().catch(() => {});
      burstStars(button, 28);
      setTimeout(() => {
        button.classList.remove("correct");
        goToNextQuestion();
      }, 900);
    }

    function onWrong(button) {
      button.classList.add("wrong");
      setTimeout(() => {
        button.classList.remove("wrong");
        state.accepting = true;
      }, 380);
    }

    function goToNextQuestion() {
      state.questionIndex += 1;
      if (state.questionIndex >= levels[state.levelIndex][1].length) {
        showVictory();
      } else {
        loadQuestion();
        playVoice();
      }
    }

    function showVictory() {
      state.highestUnlocked = levels.length;
      victoryPanel.classList.remove("victory-ready");
      show(victoryScreen);
      makeConfetti(140);
      setTimeout(() => victoryPanel.classList.add("victory-ready"), 2000);
    }

    function burstStars(target, count) {
      const rect = target.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      for (let i = 0; i < count; i += 1) {
        const star = document.createElement("span");
        const angle = (Math.PI * 2 * i) / count;
        const distance = 60 + Math.random() * 95;
        star.className = "star";
        star.style.left = `${cx - 9}px`;
        star.style.top = `${cy - 9}px`;
        star.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
        star.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);
        document.body.appendChild(star);
        star.addEventListener("animationend", () => star.remove());
      }
    }

    function makeConfetti(count) {
      const colors = ["#fac83b", "#f36c43", "#79b842", "#f5a6c8", "#fffbed", "#8e5abf"];
      for (let i = 0; i < count; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${10 + Math.random() * 80}vw`;
        piece.style.top = `${16 + Math.random() * 28}vh`;
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty("--tx", `${-220 + Math.random() * 440}px`);
        piece.style.setProperty("--ty", `${180 + Math.random() * 390}px`);
        document.body.appendChild(piece);
        piece.addEventListener("animationend", () => piece.remove());
      }
    }

    soundButton.addEventListener("click", playVoice);
    backButton.addEventListener("click", renderMenu);
    nextButton.addEventListener("click", () => {
      if (state.levelIndex + 1 < levels.length) {
        startLevel(state.levelIndex + 1);
      } else {
        renderMenu();
      }
    });

    renderMenu();
  </script>
</body>
</html>
